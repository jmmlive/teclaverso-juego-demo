<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teclaverso V2</title>

<style>
*{box-sizing:border-box;touch-action:none}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#020617;
  color:white;
  overflow:hidden;
}
#game{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
  background:linear-gradient(#07143d,#020617);
}
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:.7;
}
#hud{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  font-size:22px;
  font-weight:bold;
  z-index:5;
}
#player{
  position:absolute;
  width:54px;
  height:54px;
  border-radius:15px;
  background:#ffd700;
  bottom:120px;
  left:35px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  box-shadow:0 0 20px #ffd700;
  z-index:3;
}
.platform{
  position:absolute;
  height:22px;
  background:#00d9ff;
  border-radius:12px;
  box-shadow:0 0 18px #00d9ff;
}
.coin{
  position:absolute;
  width:36px;
  height:36px;
  border-radius:50%;
  background:#ffe600;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:24px;
  box-shadow:0 0 18px #ffe600;
}
.enemy{
  position:absolute;
  width:46px;
  height:46px;
  background:#ff1744;
  border-radius:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:28px;
  box-shadow:0 0 18px #ff1744;
}
.portal{
  position:absolute;
  width:76px;
  height:110px;
  border-radius:50%;
  border:7px solid #b967ff;
  box-shadow:0 0 35px #b967ff;
}
#menu,#win,#lose{
  position:absolute;
  inset:0;
  background:rgba(2,6,23,.94);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:25px;
  z-index:20;
}
h1{
  font-size:42px;
  margin:0 0 12px;
  color:#00d9ff;
  text-shadow:0 0 20px #00d9ff;
}
p{
  font-size:18px;
  max-width:330px;
}
button{
  border:0;
  border-radius:18px;
  padding:15px 26px;
  margin:10px;
  font-size:20px;
  font-weight:bold;
  background:#ffd700;
  color:#06111f;
}
#controls{
  position:fixed;
  bottom:70px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 18px;
  z-index:15;
  pointer-events:auto;
}
.ctrl{
  width:82px;
  height:64px;
  border-radius:20px;
  background:rgba(255,255,255,.28);
  color:white;
  font-size:30px;
  border:2px solid rgba(255,255,255,.35);
}
#jump{
  background:#ffd700;
  color:#111;
}
.hidden{display:none!important}
</style>
</head>

<body>

<div id="game">

  <div id="hud">
    <div>⭐ <span id="score">0</span>/5</div>
    <div>❤️ <span id="lives">3</span></div>
  </div>

  <div id="player">⌨️</div>

  <div id="menu">
    <h1>TECLAVERSO</h1>
    <p>Recoge las 5 teclas doradas, esquiva los errores rojos y entra al portal.</p>
    <button onclick="startGame()">Comenzar aventura</button>
  </div>

  <div id="win" class="hidden">
    <h1>¡GANASTE!</h1>
    <p>El portal del Teclaverso se abrió.</p>
    <button onclick="startGame()">Jugar otra vez</button>
  </div>

  <div id="lose" class="hidden">
    <h1>GAME OVER</h1>
    <p>El Guardián cerró el camino.</p>
    <button onclick="startGame()">Intentar de nuevo</button>
  </div>

  <div id="controls">
    <button class="ctrl" id="leftBtn">⬅️</button>
    <button class="ctrl" id="jump">⬆️</button>
    <button class="ctrl" id="rightBtn">➡️</button>
  </div>

</div>

<script>
const game=document.getElementById("game");
const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const livesEl=document.getElementById("lives");
const menu=document.getElementById("menu");
const win=document.getElementById("win");
const lose=document.getElementById("lose");

const leftBtn=document.getElementById("leftBtn");
const rightBtn=document.getElementById("rightBtn");
const jumpBtn=document.getElementById("jump");

let x=35,y=120,vy=0;
let left=false,right=false;
let score=0,lives=3;
let running=false;
let platforms=[],coins=[],enemies=[],portal;

function hold(btn,down,up){
  btn.addEventListener("touchstart",e=>{e.preventDefault();down();});
  btn.addEventListener("touchend",e=>{e.preventDefault();up();});
  btn.addEventListener("mousedown",e=>{e.preventDefault();down();});
  btn.addEventListener("mouseup",e=>{e.preventDefault();up();});
  btn.addEventListener("mouseleave",e=>{e.preventDefault();up();});
}

hold(leftBtn,()=>left=true,()=>left=false);
hold(rightBtn,()=>right=true,()=>right=false);

jumpBtn.addEventListener("touchstart",e=>{e.preventDefault();jump();});
jumpBtn.addEventListener("click",jump);

function createStars(){
  document.querySelectorAll(".star").forEach(s=>s.remove());
  for(let i=0;i<80;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    game.appendChild(s);
  }
}

function addPlatform(px,py,w){
  const p=document.createElement("div");
  p.className="platform";
  p.style.left=px+"px";
  p.style.bottom=py+"px";
  p.style.width=w+"px";
  game.appendChild(p);
  platforms.push({el:p,x:px,y:py,w:w,h:22});
}

function addCoin(cx,cy){
  const c=document.createElement("div");
  c.className="coin";
  c.textContent="*";
  c.style.left=cx+"px";
  c.style.bottom=cy+"px";
  game.appendChild(c);
  coins.push({el:c,x:cx,y:cy,w:36,h:36});
}

function addEnemy(ex,ey){
  const e=document.createElement("div");
  e.className="enemy";
  e.textContent="X";
  e.style.left=ex+"px";
  e.style.bottom=ey+"px";
  game.appendChild(e);
  enemies.push({el:e,x:ex,y:ey,w:46,h:46,dir:1});
}

function addPortal(px,py){
  portal=document.createElement("div");
  portal.className="portal";
  portal.style.left=px+"px";
  portal.style.bottom=py+"px";
  game.appendChild(portal);
}

function startGame(){
  document.querySelectorAll(".platform,.coin,.enemy,.portal").forEach(e=>e.remove());
  platforms=[];coins=[];enemies=[];
  x=35;y=120;vy=0;score=0;lives=3;
  running=true;
  scoreEl.textContent=score;
  livesEl.textContent=lives;
  menu.classList.add("hidden");
  win.classList.add("hidden");
  lose.classList.add("hidden");

  createStars();

  let W=window.innerWidth;

  addPlatform(0,90,180);
  addPlatform(W-230,170,220);
  addPlatform(45,270,260);
  addPlatform(W-245,390,230);
  addPlatform(70,515,230);

  addCoin(80,140);
  addCoin(W-120,220);
  addCoin(95,320);
  addCoin(W-160,440);
  addCoin(110,565);

  addEnemy(W-130,90);
  addEnemy(240,270);
  addEnemy(W-190,390);

  addPortal(W-100,90);
}

function onGround(){
  if(y<=90)return true;
  for(const p of platforms){
    if(x+48>p.x && x<p.x+p.w && y>=p.y+18 && y<=p.y+34){
      return true;
    }
  }
  return false;
}

function jump(){
  if(!running)return;
  if(onGround()){
    vy=17;
  }
}

function hit(a,b){
  return a.x<b.x+b.w && a.x+54>b.x && a.y<b.y+b.h && a.y+54>b.y;
}

function damage(){
  lives--;
  livesEl.textContent=lives;
  x=35;
  y=120;
  vy=0;

  if(lives<=0){
    running=false;
    lose.classList.remove("hidden");
  }
}

function loop(){
  if(running){
    if(left)x-=5;
    if(right)x+=5;

    x=Math.max(0,Math.min(window.innerWidth-58,x));

    vy-=0.75;
    y+=vy;

    if(y<=90){
      y=90;
      vy=0;
    }

    for(const p of platforms){
      if(x+48>p.x && x<p.x+p.w && y<=p.y+25 && y>=p.y+5 && vy<=0){
        y=p.y+22;
        vy=0;
      }
    }

    player.style.left=x+"px";
    player.style.bottom=y+"px";

    const me={x:x,y:y,w:54,h:54};

    coins=coins.filter(c=>{
      if(hit(me,c)){
        c.el.remove();
        score++;
        scoreEl.textContent=score;
        return false;
      }
      return true;
    });

    for(const e of enemies){
      e.x+=e.dir*2.2;
      if(e.x<10||e.x>window.innerWidth-60){
        e.dir*=-1;
      }
      e.el.style.left=e.x+"px";

      if(hit(me,e)){
        damage();
      }
    }

    if(score>=5 && portal){
      const pr={x:window.innerWidth-100,y:90,w:76,h:110};
      if(hit(me,pr)){
        running=false;
        win.classList.remove("hidden");
      }
    }
  }

  requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")left=true;
  if(e.key==="ArrowRight")right=true;
  if(e.key==="ArrowUp"||e.key===" ")jump();
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")left=false;
  if(e.key==="ArrowRight")right=false;
});

createStars();
loop();
</script>

</body>
</html>
