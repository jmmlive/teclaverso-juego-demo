<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teclaverso V6</title>
<style>
*{box-sizing:border-box;touch-action:none;user-select:none}
body{margin:0;background:#020617;color:white;font-family:Arial,sans-serif;overflow:hidden}
.hidden{display:none!important}
#app,#game{width:100vw;height:100vh;position:relative;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;z-index:50}
#cover{background:url("file_000000009340724698eb6cd16bdbcb8c.png") center/cover no-repeat}
#cover:after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.55)}
.menuBox{position:absolute;bottom:30px;left:18px;right:18px;z-index:2;background:rgba(0,0,0,.6);border:2px solid #00d9ff;border-radius:24px;padding:18px;box-shadow:0 0 25px #00d9ff}
h1{color:#00d9ff;text-shadow:0 0 18px #00d9ff}
button{border:0;border-radius:18px;padding:14px 22px;margin:6px;font-size:19px;font-weight:bold;background:#ffd700;color:#06111f}
.secondary{background:#101b35;color:white;border:2px solid #00d9ff}
#world{position:absolute;left:0;bottom:0;width:2600px;height:100vh;background:linear-gradient(#08184a,#020617)}
.ground{position:absolute;left:0;bottom:70px;width:2600px;height:40px;background:#1e293b;border-top:3px solid #00d9ff;box-shadow:0 0 20px #00d9ff}
.platform{position:absolute;height:32px;background:#1e293b;border:2px solid #00d9ff;border-radius:18px;box-shadow:0 0 15px #00d9ff}
.coin{position:absolute;width:42px;height:42px;border-radius:50%;background:#ffe600;box-shadow:0 0 18px #ffe600}
.coin:before{content:"⌨";color:#111;font-size:23px;font-weight:bold;display:flex;align-items:center;justify-content:center;height:100%}
#player{position:absolute;width:85px;height:115px;background:url("1000208699-removebg-preview.png") center/contain no-repeat;z-index:8;filter:drop-shadow(0 0 12px #ffd700)}
.enemy{position:absolute;width:95px;height:125px;background:url("file_00000000b3f872439ea71134503633c8.png") center/contain no-repeat;z-index:7;filter:drop-shadow(0 0 16px #ff1744)}
.boss{width:125px;height:165px}
.portal{position:absolute;width:95px;height:135px;border-radius:50%;border:8px solid #b967ff;background:radial-gradient(circle,#d7a8ff,#5b21b6 45%,transparent 70%);box-shadow:0 0 40px #b967ff}
#hud{position:fixed;top:10px;left:10px;right:10px;z-index:40;display:flex;justify-content:space-between;font-weight:bold}
.hudBox{background:rgba(0,0,0,.5);border:1px solid #00d9ff;border-radius:15px;padding:8px 12px}
#message{position:fixed;top:60px;left:12px;right:12px;text-align:center;z-index:40;background:rgba(0,0,0,.45);border-radius:14px;padding:7px}
#controls{position:fixed;bottom:65px;left:0;right:0;z-index:45;display:flex;justify-content:space-between;padding:0 18px}
.group{display:flex;gap:12px}
.ctrl{width:76px;height:62px;border-radius:22px;background:rgba(255,255,255,.25);color:white;font-size:30px;border:2px solid rgba(255,255,255,.45)}
#jump{background:#ffd700;color:#111}
#attack{background:#ff1744;color:white}
.power{position:absolute;width:38px;height:22px;border-radius:20px;background:#00d9ff;box-shadow:0 0 16px #00d9ff;z-index:9}
#win,#lose,#options,#credits{background:rgba(2,6,23,.95);padding:25px}
</style>
</head>
<body>

<div id="app">

<div id="cover" class="screen">
  <div class="menuBox">
    <h1>TECLAVERSO</h1>
    <p>Ruth contra Diabro</p>
    <button onclick="startGame()">Jugar</button>
    <button class="secondary" onclick="showScreen('options')">Opciones</button>
    <button class="secondary" onclick="showScreen('credits')">Créditos</button>
  </div>
</div>

<div id="options" class="screen hidden">
  <div>
    <h1>Opciones</h1>
    <p>Recoge 8 teclas, esquiva a Diabro y llega al portal.</p>
    <button onclick="menu()">Volver</button>
  </div>
</div>

<div id="credits" class="screen hidden">
  <div>
    <h1>Créditos</h1>
    <p>Protagonista: Ruth</p>
    <p>Villano: Diabro</p>
    <button onclick="menu()">Volver</button>
  </div>
</div>

<div id="game" class="hidden">
  <div id="world">
    <div class="ground"></div>
    <div id="player"></div>
  </div>

  <div id="hud">
    <div class="hudBox">⭐ <span id="score">0</span>/8</div>
    <div class="hudBox">❤️ <span id="life">100</span>%</div>
  </div>

  <div id="message">Recoge las teclas y llega al portal.</div>

  <div id="controls">
    <div class="group">
      <button class="ctrl" id="left">⬅️</button>
      <button class="ctrl" id="right">➡️</button>
    </div>
    <div class="group">
      <button class="ctrl" id="attack">⚡</button>
      <button class="ctrl" id="jump">⬆️</button>
    </div>
  </div>
</div>

<div id="win" class="screen hidden">
  <div>
    <h1>¡GANASTE!</h1>
    <p>Ruth llegó al portal del Teclaverso.</p>
    <button onclick="startGame()">Jugar otra vez</button>
    <button onclick="menu()">Menú</button>
  </div>
</div>

<div id="lose" class="screen hidden">
  <div>
    <h1>GAME OVER</h1>
    <p>Diabro cerró el camino.</p>
    <button onclick="startGame()">Intentar otra vez</button>
    <button onclick="menu()">Menú</button>
  </div>
</div>

</div>

<script>
const cover=document.getElementById("cover"),game=document.getElementById("game"),world=document.getElementById("world");
const player=document.getElementById("player"),scoreEl=document.getElementById("score"),lifeEl=document.getElementById("life"),msg=document.getElementById("message");
let x=70,y=110,vy=0,left=false,right=false,facing=1,running=false,score=0,life=100,camera=0;
let platforms=[],coins=[],enemies=[],powers=[],portal=null,lastHit=0;

function hideAll(){["cover","game","options","credits","win","lose"].forEach(id=>document.getElementById(id).classList.add("hidden"))}
function menu(){running=false;hideAll();cover.classList.remove("hidden")}
function showScreen(id){hideAll();document.getElementById(id).classList.remove("hidden")}

function hold(btn,down,up){
 btn.addEventListener("touchstart",e=>{e.preventDefault();down()});
 btn.addEventListener("touchend",e=>{e.preventDefault();up()});
 btn.addEventListener("mousedown",e=>{e.preventDefault();down()});
 btn.addEventListener("mouseup",e=>{e.preventDefault();up()});
 btn.addEventListener("mouseleave",e=>{e.preventDefault();up()});
}
hold(document.getElementById("left"),()=>left=true,()=>left=false);
hold(document.getElementById("right"),()=>right=true,()=>right=false);
document.getElementById("jump").addEventListener("touchstart",e=>{e.preventDefault();jump()});
document.getElementById("jump").addEventListener("click",jump);
document.getElementById("attack").addEventListener("touchstart",e=>{e.preventDefault();attack()});
document.getElementById("attack").addEventListener("click",attack);

function addPlatform(px,py,w){let p=document.createElement("div");p.className="platform";p.style.left=px+"px";p.style.bottom=py+"px";p.style.width=w+"px";world.appendChild(p);platforms.push({x:px,y:py,w,h:32,el:p})}
function addCoin(cx,cy){let c=document.createElement("div");c.className="coin";c.style.left=cx+"px";c.style.bottom=cy+"px";world.appendChild(c);coins.push({x:cx,y:cy,w:42,h:42,el:c})}
function addEnemy(ex,ey,boss=false){let e=document.createElement("div");e.className=boss?"enemy boss":"enemy";e.style.left=ex+"px";e.style.bottom=ey+"px";world.appendChild(e);enemies.push({x:ex,y:ey,w:boss?125:95,h:boss?165:125,dir:-1,speed:boss?1.1:.8,life:boss?100:30,boss,el:e})}
function addPortal(px,py){portal=document.createElement("div");portal.className="portal";portal.style.left=px+"px";portal.style.bottom=py+"px";world.appendChild(portal)}

function clearLevel(){document.querySelectorAll(".platform,.coin,.enemy,.portal,.power").forEach(e=>e.remove());platforms=[];coins=[];enemies=[];powers=[];portal=null}

function startGame(){
 hideAll();game.classList.remove("hidden");clearLevel();
 x=70;y=110;vy=0;left=false;right=false;facing=1;score=0;life=100;camera=0;running=true;
 scoreEl.textContent=score;lifeEl.textContent=life;msg.textContent="Recoge 8 teclas y llega al portal.";

 addPlatform(0,110,520);
 addPlatform(620,110,420);
 addPlatform(1130,110,420);
 addPlatform(1660,110,420);
 addPlatform(2160,110,360);

 addPlatform(760,210,220);
 addPlatform(1390,220,240);
 addPlatform(1880,225,220);

 [230,690,1210,1760,2290].forEach(px=>addCoin(px,170));
 addCoin(850,270);addCoin(1490,280);addCoin(1970,285);

 addEnemy(980,110);
 addEnemy(1540,110);
 addEnemy(2070,110);
 addEnemy(2370,110,true);
 addPortal(2480,110);
 updatePlayer();
}

function onGround(){
 for(const p of platforms){
  if(x+60>p.x && x<p.x+p.w && y>=p.y+24 && y<=p.y+52)return true;
 }
 return false;
}

function jump(){if(running&&onGround())vy=17}

function attack(){
 if(!running)return;
 let p=document.createElement("div");p.className="power";
 let px=facing===1?x+70:x-20, py=y+58;
 p.style.left=px+"px";p.style.bottom=py+"px";world.appendChild(p);
 powers.push({x:px,y:py,w:38,h:22,dir:facing,el:p});
}

function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function damage(amount){
 let now=Date.now();if(now-lastHit<1000)return;lastHit=now;
 life-=amount;if(life<0)life=0;lifeEl.textContent=life;
 x=Math.max(70,x-100);y=110;vy=0;
 msg.textContent="¡Cuidado! Diabro te tocó.";
 if(life<=0){running=false;hideAll();document.getElementById("lose").classList.remove("hidden")}
}

function updatePlayer(){
 player.style.left=x+"px";player.style.bottom=y+"px";
 player.style.transform=facing===-1?"scaleX(-1)":"scaleX(1)";
}

function updateCamera(){
 camera=x-window.innerWidth*.35;
 if(camera<0)camera=0;
 if(camera>2600-window.innerWidth)camera=2600-window.innerWidth;
 world.style.transform="translateX("+(-camera)+"px)";
}

function loop(){
 if(running){
  if(left){x-=4.2;facing=-1}
  if(right){x+=4.2;facing=1}
  if(x<0)x=0;if(x>2520)x=2520;

  vy-=.65;y+=vy;

  for(const p of platforms){
   if(x+62>p.x&&x<p.x+p.w&&y<=p.y+p.h&&y>=p.y&&vy<=0){y=p.y+p.h;vy=0}
  }

  if(y<40)damage(25);

  updatePlayer();
  let ruth={x:x+18,y:y+8,w:50,h:95};

  coins=coins.filter(c=>{
   if(hit(ruth,c)){c.el.remove();score++;scoreEl.textContent=score;msg.textContent="Tecla recogida "+score+"/8";return false}
   return true;
  });

  for(const e of enemies){
   e.x+=e.dir*e.speed;
   if(!e.boss){if(e.x<900)e.dir=1;if(e.x>1100)e.dir=-1}
   else{if(e.x<2260)e.dir=1;if(e.x>2420)e.dir=-1}
   e.el.style.left=e.x+"px";
   if(hit(ruth,{x:e.x+20,y:e.y+10,w:e.w-40,h:e.h-20}))damage(e.boss?25:15);
  }

  powers=powers.filter(p=>{
   p.x+=p.dir*9;p.el.style.left=p.x+"px";
   for(const e of enemies){
    if(hit(p,{x:e.x,y:e.y,w:e.w,h:e.h})){
     e.life-=e.boss?12:30;p.el.remove();
     if(e.life<=0){e.el.remove();enemies=enemies.filter(en=>en!==e)}
     return false;
    }
   }
   if(p.x<camera-100||p.x>camera+window.innerWidth+100){p.el.remove();return false}
   return true;
  });

  if(score>=8&&portal&&hit(ruth,{x:2480,y:110,w:95,h:135})){
   running=false;hideAll();document.getElementById("win").classList.remove("hidden");
  }

  if(score>=8)msg.textContent="¡Portal abierto! Sigue hasta el final.";
  updateCamera();
 }
 requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")left=true;if(e.key==="ArrowRight")right=true;if(e.key==="ArrowUp"||e.key===" ")jump();if(e.key==="x"||e.key==="X")attack()});
document.addEventListener("keyup",e=>{if(e.key==="ArrowLeft")left=false;if(e.key==="ArrowRight")right=false});
loop();
</script>
</body>
</html>
